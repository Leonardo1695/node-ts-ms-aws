name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NX_DAEMON: 'false'
  VITE_API_BASE_URL: http://localhost:3003
  VITE_API_KEY: dev-api-key-change-me

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npx eslint apps libs --quiet

      - name: Typecheck
        run: npx nx run-many -t typecheck --all --exclude=python-etl,@verdiron/source

      - name: Test
        run: npx nx run-many -t test --all --exclude=python-etl,@verdiron/source --parallel=4

      - name: Build
        run: npx nx run-many -t build --all --exclude=python-etl,@verdiron/source

  python-etl:
    name: Python ETL tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            jobs/python-etl/requirements.txt
            jobs/python-etl/requirements-dev.txt

      - name: Install Python dependencies
        run: pip install -r jobs/python-etl/requirements.txt -r jobs/python-etl/requirements-dev.txt

      - name: Test
        working-directory: jobs/python-etl
        env:
          PYTHONPATH: src
        run: python -m pytest

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs:
      - quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Integration tests
        env:
          RUN_INTEGRATION_TESTS: 'true'
        run: npx nx run-many -t integration-test --parallel=1

  e2e:
    name: Playwright demo e2e
    runs-on: ubuntu-latest
    needs:
      - docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for UI and API
        shell: bash
        run: bash tools/wait-for-stack.sh

      - name: Playwright e2e
        env:
          RUN_E2E_TESTS: 'true'
          E2E_BASE_URL: http://localhost:4200
          VITE_API_BASE_URL: http://localhost:3003
          VITE_API_KEY: dev-api-key-change-me
        run: npx nx run web-dashboard:e2e

      - name: Stop stack
        if: always()
        run: docker compose down -v

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - quality
      - python-etl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application images
        run: |
          docker compose build \
            db-migrate \
            ingestion-service \
            processing-service \
            api-service \
            device-simulator \
            web-dashboard \
            python-etl

  # deploy:
